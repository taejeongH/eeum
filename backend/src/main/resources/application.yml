# 1. 로컬 환경 설정 (기본값)
spring:
  profiles:
    include: secret

  cloud:
    aws:
      region:
        static: ap-northeast-2

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Swagger 설정 추가
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true

jwt:
  private-key-path: certs/private_key_pkcs8.pem
  public-key-path: certs/public_key.pem
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000

logging:
  level:
    org.ssafy.eeum: debug
    org.springframework.security: debug
    org.springframework.security.oauth2: debug

---
# 2. 배포 환경 설정 (프로필 이름: prod)
spring:
  config:
    activate:
      on-profile: prod

server:
  forward-headers-strategy: native