events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 1. HTTP(80)로 들어오면 HTTPS(443)로 강제 이동
    server {
        listen 80;
        server_name i14a105.p.ssafy.io;
        return 301 https://$host$request_uri;
    }

    # 2. 실제 서비스 로직 (HTTPS)
    server {
        listen 443 ssl;
        server_name i14a105.p.ssafy.io;

        # SSL 인증서 설정 (Certbot 발급 경로)
        ssl_certificate /etc/letsencrypt/live/i14a105.p.ssafy.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/i14a105.p.ssafy.io/privkey.pem;

        # 프론트엔드 정적 파일 서빙
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 백엔드 API 프록시 설정
        location /api {
            proxy_pass http://eeum-app:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}