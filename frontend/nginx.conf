# 2. 실제 서비스 로직 (HTTPS)
server {
    listen 443 ssl;
    server_name i14a105.p.ssafy.io;

    # SSL 인증서 설정 (기존 유지)
    ssl_certificate /etc/letsencrypt/live/i14a105.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i14a105.p.ssafy.io/privkey.pem;

    # [중요] 카카오 OAuth2 리다이렉트 경로 처리
    # /login/oauth2/... 주소로 들어오는 요청을 백엔드(8080)로 던져줍니다.
    location /login/oauth2/ {
        proxy_pass http://eeum-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 백엔드 API 프록시 설정 (기존 유지)
    location /api {
        proxy_pass http://eeum-app:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 프론트엔드 정적 파일 서빙 (가장 아래에 위치)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}