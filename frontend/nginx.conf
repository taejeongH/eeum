# 1. HTTP -> HTTPS 리다이렉트 (기존 유지)
server {
    listen 80;
    server_name i14a105.p.ssafy.io;
    return 301 https://$host$request_uri;
}

# 2. 실제 서비스 로직 (HTTPS)
server {
    listen 443 ssl;
    server_name i14a105.p.ssafy.io;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # SSL 인증서 설정
    ssl_certificate /etc/letsencrypt/live/i14a105.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i14a105.p.ssafy.io/privkey.pem;

    # [추가] Swagger UI 및 API Docs 경로 (백엔드로 연결)
    location /swagger-ui {
        proxy_pass http://eeum-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs {
        proxy_pass http://eeum-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 카카오 OAuth2 리다이렉트 경로
    location /login/oauth2 {
        proxy_pass http://eeum-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 백엔드 API 프록시 설정
    location /api {
        proxy_pass http://eeum-app:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 프론트엔드 정적 파일 서빙
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}